<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>The Deck</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Roboto+Mono&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.7.2/css/all.min.css">
    <link rel="stylesheet" href="the-deck.css">
</head>
<body class="bg-light">

    <!-- Barre de navigation supérieure -->
    <nav class="navbar navbar-expand-lg navbar-dark bg-custom-primary">
        <div class="container-fluid gap-3">
            <!-- Titre + bouton réduction sidebar -->
            <div class="d-flex align-items-center flex-shrink-0">
                <a class="navbar-brand mb-0" href="#" id="home-link">
                    <i class="fas fa-layer-group me-2"></i> The Deck
                </a>
                <button class="btn btn-link text-white p-1 ms-1" id="sidebar-collapse-btn" title="Masquer le menu">
                    <i class="fas fa-angles-left"></i>
                </button>
            </div>
            <!-- Recherche (gauche) -->
            <div id="search-wrapper" class="flex-grow-1" style="max-width:380px;">
                <div class="input-group">
                    <input type="text" class="form-control" id="search-input"
                           placeholder="Rechercher un outil…" autocomplete="off">
                    <span class="input-group-text bg-transparent border-start-0 search-shortcut text-white border-0">Ctrl+K</span>
                </div>
                <div id="search-dropdown" style="display:none;"></div>
            </div>
            <!-- Thème (droite) -->
            <button class="btn btn-outline-light ms-auto flex-shrink-0" id="theme-toggle"><i class="fas fa-circle-half-stroke"></i></button>
        </div>
    </nav>

    <div class="container-fluid">
        <div class="row flex-nowrap">

            <!-- Barre latérale -->
            <div class="col-auto px-0 bg-custom-sidebar" id="sidebar">
                <div class="d-flex flex-column align-items-center align-items-sm-start px-3 pt-3 min-vh-100">
                    <ul class="nav nav-pills flex-column mb-sm-auto mb-0 align-items-center align-items-sm-start w-100" id="sidebar-menu">
                        <li class="nav-item w-100">
                            <a href="#" class="nav-link text-white d-flex justify-content-between align-items-center" data-bs-toggle="collapse" data-bs-target="#crypto-menu">
                                <span class="d-flex align-items-center">
                                    <i class="fas fa-lock me-2"></i>
                                    <span class="menu-text">Crypto</span>
                                </span>
                                <i class="fas fa-chevron-down menu-toggle"></i>
                            </a>
                            <div class="collapse show" id="crypto-menu">
                                <ul class="nav nav-pills flex-column ms-3 mt-2 mb-2 align-items-center align-items-sm-start w-100">
                                    <li class="nav-item w-100">
                                        <a href="#" class="nav-link text-white" data-section="token-generator">
                                            <i class="fas fa-key me-2"></i>
                                            <span class="menu-text">Token Generator</span>
                                        </a>
                                    </li>
                                    <li class="nav-item w-100">
                                        <a href="#" class="nav-link text-white" data-section="hash-text">
                                            <i class="fas fa-fingerprint me-2"></i>
                                            <span class="menu-text">Hash / HMAC</span>
                                        </a>
                                    </li>
                                    <li class="nav-item w-100">
                                        <a href="#" class="nav-link text-white" data-section="bcrypt-generator">
                                            <i class="fas fa-shield-halved me-2"></i>
                                            <span class="menu-text">Bcrypt</span>
                                        </a>
                                    </li>
                                    <li class="nav-item w-100">
                                        <a href="#" class="nav-link text-white" data-section="key-generator">
                                            <i class="fas fa-file-signature me-2"></i>
                                            <span class="menu-text">Key Generator</span>
                                        </a>
                                    </li>
                                    <li class="nav-item w-100">
                                        <a href="#" class="nav-link text-white" data-section="uuid-generator">
                                            <i class="fas fa-dice me-2"></i>
                                            <span class="menu-text">UUID Generator</span>
                                        </a>
                                    </li>
                                    <li class="nav-item w-100">
                                        <a href="#" class="nav-link text-white" data-section="base64">
                                            <i class="fas fa-right-left me-2"></i>
                                            <span class="menu-text">Base64</span>
                                        </a>
                                    </li>
                                    <li class="nav-item w-100">
                                        <a href="#" class="nav-link text-white" data-section="hex-encoder">
                                            <i class="fas fa-hashtag me-2"></i>
                                            <span class="menu-text">Hex (Base16)</span>
                                        </a>
                                    </li>
                                    <li class="nav-item w-100">
                                        <a href="#" class="nav-link text-white" data-section="jwt-decoder">
                                            <i class="fas fa-id-card me-2"></i>
                                            <span class="menu-text">JWT</span>
                                        </a>
                                    </li>
                                    <li class="nav-item w-100">
                                        <a href="#" class="nav-link text-white" data-section="cert-generator">
                                            <i class="fas fa-certificate me-2"></i>
                                            <span class="menu-text">Certificate</span>
                                        </a>
                                    </li>
                                </ul>
                            </div>
                        </li>
                        <!-- Utilitaires -->
                        <li class="nav-item w-100">
                            <a href="#" class="nav-link text-white d-flex justify-content-between align-items-center" data-bs-toggle="collapse" data-bs-target="#utils-menu">
                                <span class="d-flex align-items-center">
                                    <i class="fas fa-wrench me-2"></i>
                                    <span class="menu-text">Utilitaires</span>
                                </span>
                                <i class="fas fa-chevron-down menu-toggle"></i>
                            </a>
                            <div class="collapse show" id="utils-menu">
                                <ul class="nav nav-pills flex-column ms-3 mt-2 mb-2 align-items-center align-items-sm-start w-100">
                                    <li class="nav-item w-100">
                                        <a href="#" class="nav-link text-white" data-section="diff-tools">
                                            <i class="fas fa-code-compare me-2"></i>
                                            <span class="menu-text">Diff Tools</span>
                                        </a>
                                    </li>
                                </ul>
                            </div>
                        </li>
                        <li class="nav-item w-100">
                            <a href="#" class="nav-link text-white" data-section="color-picker">
                                <i class="fas fa-palette me-2"></i>
                                <span class="menu-text">Color Picker</span>
                            </a>
                        </li>
                        <li class="nav-item w-100">
                            <a href="#" class="nav-link text-white" data-section="datetime-converter">
                                <i class="fas fa-clock me-2"></i>
                                <span class="menu-text">Date-Time</span>
                            </a>
                        </li>
                        <li class="nav-item w-100">
                            <a href="#" class="nav-link text-white" data-section="device-info">
                                <i class="fas fa-mobile-alt me-2"></i>
                                <span class="menu-text">Device Info</span>
                            </a>
                        </li>
                        <li class="nav-item w-100">
                            <a href="#" class="nav-link text-white" data-section="http-codes">
                                <i class="fas fa-list-ol me-2"></i>
                                <span class="menu-text">HTTP Codes</span>
                            </a>
                        </li>
                        <li class="nav-item w-100">
                            <a href="#" class="nav-link text-white" data-section="subnet-calculator">
                                <i class="fas fa-network-wired me-2"></i>
                                <span class="menu-text">Subnet Calculator</span>
                            </a>
                        </li>
                    </ul>
                </div>
            </div>

            <!-- Contenu principal — sections chargées dynamiquement -->
            <div class="col py-3" id="main-content"></div>

        </div>
    </div>

    <!-- Bootstrap 5.3 JS -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <!-- Crypto & Hash libraries (globals used by modules) -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/crypto-js/4.1.1/crypto-js.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/bcryptjs/2.4.3/bcrypt.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/js-sha1/0.6.0/sha1.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jsencrypt/3.3.2/jsencrypt.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/tweetnacl@1.0.3/nacl.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/elliptic/6.6.1/elliptic.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/js-base64@3.7.5/base64.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jsrsasign/10.5.27/jsrsasign-all-min.js"></script>
    <!-- App (ES Module) -->
    <script type="module" src="the-deck.js"></script>
</body>
</html>
